<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabus Builder — The Habits of Discourse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg-subtle: #111118;
  --spark-gold: #e8a838;
  --spark-orange: #d4622a;
  --spark-white: #f5e6c8;
  --text-primary: #e8e4dc;
  --text-secondary: #9a9590;
  --text-muted: #5e5955;
  --accent: #c9853a;
  --accent-dim: #8a5a28;
  --danger-red: #b84233;
  --border-faint: rgba(200,170,130,0.08);
  --border-hover: rgba(200,170,130,0.2);
  --card-bg: rgba(255,255,255,0.015);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
}

#spark-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0;
  pointer-events: none;
}

/* ============ NAV ============ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.5rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  transition: padding 0.4s ease, background 0.4s ease;
}

nav.scrolled {
  padding: 0.8rem 3rem;
  background: rgba(10,10,15,0.96);
}

.nav-logo {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: 0.02em;
  text-decoration: none;
}

.nav-logo span { color: var(--accent); }

.nav-links {
  display: flex;
  gap: 2.5rem;
  list-style: none;
}

.nav-links a {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.3s;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 0;
  height: 1px;
  background: var(--accent);
  transition: width 0.3s;
}

.nav-links a:hover { color: var(--spark-gold); }
.nav-links a:hover::after { width: 100%; }

.nav-links a.active { color: var(--spark-gold); }
.nav-links a.active::after { width: 100%; }

/* ============ MAIN ============ */
main {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 7rem 3rem 6rem;
}

main::before {
  content: '';
  position: absolute;
  top: 5rem;
  left: 0;
  right: 0;
  bottom: 4rem;
  background: rgba(10, 10, 15, 0.78);
  -webkit-mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
  z-index: -1;
  pointer-events: none;
}

@media (max-width: 900px) {
  main::before {
    left: -1rem;
    right: -1rem;
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 2%, black 98%, transparent 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 2%, black 98%, transparent 100%);
  }
}

/* ============ HERO ============ */
.hero {
  text-align: center;
  margin-bottom: 4rem;
  animation: fadeUp 1.2s ease-out both;
}

.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 300;
  line-height: 1.05;
  color: var(--text-primary);
}

.hero h1 em {
  font-style: italic;
  color: var(--spark-gold);
  font-weight: 400;
}

.hero p.lede {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 300;
  font-style: italic;
  color: var(--text-secondary);
  max-width: 640px;
  margin: 1.5rem auto 0;
  line-height: 1.5;
}

/* ============ STEP OVERVIEW ============ */
.overview {
  max-width: 760px;
  margin: 3.5rem auto 0;
  text-align: left;
  animation: fadeUp 1.2s ease-out 0.3s both;
}

.overview-tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-align: center;
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  justify-content: center;
}

.overview-tag::before,
.overview-tag::after {
  content: '';
  flex: 0 0 40px;
  height: 1px;
  background: var(--accent-dim);
}

.overview-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.overview-item {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 1.5rem;
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--border-faint);
  align-items: baseline;
}

.overview-item:first-child { border-top: 1px solid var(--border-faint); }

.overview-num {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 300;
  font-style: italic;
  color: var(--accent);
  line-height: 1;
  text-align: right;
}

.overview-text {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.overview-title {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 500;
  color: var(--text-primary);
  font-style: italic;
}

.overview-desc {
  font-family: var(--sans);
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ============ SECTION LABEL ============ */
.section-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--accent);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.section-label::before {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--accent-dim);
}

/* ============ STEPPER ============ */
.stepper {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  border-top: 1px solid var(--border-faint);
  border-bottom: 1px solid var(--border-faint);
  margin-bottom: 3.5rem;
}

.step-tab {
  background: transparent;
  border: none;
  border-right: 1px solid var(--border-faint);
  border-bottom: 1px solid transparent;
  padding: 1.25rem 0.6rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
  color: inherit;
  font: inherit;
}

.step-tab:last-child { border-right: none; }

.step-tab:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.step-tab.active {
  background: rgba(232,168,56,0.04);
  border-bottom-color: var(--spark-gold);
}

.step-num {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 300;
  font-style: italic;
  color: var(--text-muted);
  line-height: 1;
}

.step-tab.active .step-num { color: var(--spark-gold); }

.step-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-secondary);
  line-height: 1.2;
}

.step-tab.active .step-label { color: var(--text-primary); }

/* ============ STEP HEADERS ============ */
.step-h2 {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 300;
  line-height: 1.15;
  color: var(--text-primary);
  margin-bottom: 0.8rem;
}

.step-h2 em {
  font-style: italic;
  color: var(--spark-gold);
}

.step-desc {
  font-size: 0.95rem;
  color: var(--text-secondary);
  max-width: 600px;
  margin-bottom: 3rem;
  line-height: 1.7;
}

.counter {
  font-family: var(--mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 3rem;
  margin-top: -2rem;
}

.counter.full { color: var(--spark-gold); }

/* ============ CARDS ============ */
.card {
  border: 1px solid var(--border-faint);
  background: var(--card-bg);
  position: relative;
  transition: border-color 0.4s, background 0.4s, transform 0.4s;
  overflow: hidden;
  padding: 2rem;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--spark-gold), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}

.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}

.card.selected {
  border-color: rgba(232,168,56,0.35);
  background: rgba(232,168,56,0.04);
  transform: none;
}

.card.selected::before { opacity: 1; }

.card-list {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

/* ============ CHECKBOX ============ */
.checkbox {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border: 1px solid var(--accent-dim);
  background: transparent;
  color: var(--spark-gold);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  font-family: var(--serif);
  font-size: 0.95rem;
  line-height: 1;
  padding: 0;
}

.checkbox.checked {
  border-color: var(--spark-gold);
  background: rgba(232,168,56,0.12);
}

.checkbox:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}

/* ============ READING ROW ============ */
.reading-row { padding: 1.6rem 1.8rem; }

.reading-inner {
  display: flex;
  gap: 1.2rem;
  align-items: flex-start;
}

.reading-body { flex: 1; min-width: 0; }

.reading-title {
  font-family: var(--serif);
  font-size: 1.35rem;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.25;
}

.reading-meta {
  font-family: var(--sans);
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

.reading-note {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1rem;
  color: var(--text-secondary);
  margin-top: 0.7rem;
  line-height: 1.55;
}

.reading-link {
  display: inline-block;
  margin-top: 0.8rem;
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-dim);
  padding-bottom: 2px;
  transition: color 0.3s;
}

.reading-link:hover { color: var(--spark-gold); }

/* ============ TOPIC HEADER (collapsible) ============ */
.topic-group {
  margin-top: 3.5rem;
}

.topic-group:first-of-type {
  margin-top: 0;
}

.topic-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  background: transparent;
  border: none;
  padding: 0.6rem 0;
  width: 100%;
  cursor: pointer;
  font-family: inherit;
  color: inherit;
  text-align: left;
}

.topic-header:hover .topic-name {
  color: var(--spark-gold);
}

.topic-header:hover .topic-chevron {
  color: var(--spark-gold);
}

.topic-glyph {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.4rem;
  height: 1.4rem;
  color: var(--spark-orange);
  transition: color 0.25s, transform 0.25s;
}

.topic-glyph svg {
  width: 100%;
  height: 100%;
  display: block;
}

.topic-header:hover .topic-glyph {
  color: var(--spark-gold);
  transform: translateY(-2px);
}

.topic-name {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.01em;
  transition: color 0.25s;
}

.topic-count {
  font-family: var(--mono);
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--spark-gold);
  border: 1px solid var(--accent-dim);
  padding: 0.25rem 0.55rem;
  flex-shrink: 0;
}

.topic-rule {
  flex: 1;
  height: 1px;
  background: var(--border-faint);
}

.topic-chevron {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--accent);
  flex-shrink: 0;
  transition: color 0.25s;
  width: 14px;
  text-align: center;
  margin-left: -0.3rem;
}

.topic-units {
  display: none;
  animation: fadeUp 0.4s ease-out both;
}

.topic-units.open {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

/* ============ UNIT CARD ============ */
.unit-card { padding: 2rem 2.2rem; }

.unit-inner {
  display: flex;
  gap: 1.4rem;
  align-items: flex-start;
}

.unit-body { flex: 1; min-width: 0; }

.unit-head {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  margin-bottom: 8px;
}

.unit-glyph {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.5rem;
  height: 1.5rem;
  color: var(--spark-orange);
  flex-shrink: 0;
}

.unit-glyph svg {
  width: 100%;
  height: 100%;
  display: block;
}

.unit-title {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 500;
  color: var(--spark-gold);
  line-height: 1.15;
}

.unit-descriptor {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-style: italic;
  color: var(--spark-gold);
  font-weight: 300;
  margin-bottom: 1rem;
  line-height: 1.4;
}

.unit-summary {
  font-family: var(--sans);
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

.unit-toggle {
  margin-top: 1.2rem;
  background: transparent;
  border: none;
  padding: 0;
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: color 0.3s;
}

.unit-toggle:hover { color: var(--spark-gold); }

.unit-detail {
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border-faint);
  display: none;
}

.unit-detail.open { display: block; }

.detail-tag {
  font-family: var(--mono);
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.detail-resolution {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--danger-red);
  margin-bottom: 1.5rem;
  line-height: 1.4;
}

.week-block { margin-bottom: 1.4rem; }

.week-head {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 6px;
}

.week-roman {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 300;
  font-style: italic;
  color: var(--accent);
  line-height: 1;
}

.week-num {
  font-family: var(--mono);
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-muted);
}

.week-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.05rem;
  color: var(--text-primary);
}

.reading-list {
  list-style: none;
  padding: 0;
  margin: 0 0 0 1rem;
}

.reading-list li {
  font-family: var(--sans);
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.7;
  padding-left: 1rem;
  position: relative;
}

.reading-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--text-muted);
}

.activities {
  margin-top: 0.4rem;
  margin-left: 1rem;
  font-family: var(--mono);
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
}

/* ============ ORDERING ============ */
.order-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.order-row {
  display: flex;
  align-items: stretch;
  gap: 1rem;
  border: 1px solid var(--border-faint);
  background: var(--card-bg);
  padding: 1.4rem 1.6rem;
  transition: border-color 0.3s, background 0.3s, opacity 0.2s, transform 0.2s;
  cursor: grab;
  user-select: none;
}

.order-row:hover {
  border-color: var(--border-hover);
}

.order-row:active {
  cursor: grabbing;
}

.order-row.dragging {
  opacity: 0.4;
  border-color: var(--spark-gold);
}

.order-row.drop-target-above {
  border-top: 2px solid var(--spark-gold);
}

.order-row.drop-target-below {
  border-bottom: 2px solid var(--spark-gold);
}

.order-handle {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  color: var(--text-muted);
  font-size: 1.2rem;
  line-height: 1;
  letter-spacing: -0.1em;
  transition: color 0.25s;
  padding-right: 0.4rem;
}

.order-row:hover .order-handle {
  color: var(--spark-gold);
}

.order-position {
  flex-shrink: 0;
  width: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.2rem;
  padding-right: 1rem;
  border-right: 1px solid var(--border-faint);
}

.order-position-tag {
  font-family: var(--mono);
  font-size: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-muted);
}

.order-position-num {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 300;
  font-style: italic;
  color: var(--spark-gold);
  line-height: 1;
}

.order-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.order-title {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--spark-gold);
  line-height: 1.2;
}

.order-descriptor {
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-secondary);
  margin-top: 0.3rem;
  line-height: 1.4;
}

.order-controls {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  justify-content: center;
}

.order-btn {
  width: 36px;
  height: 28px;
  background: transparent;
  border: 1px solid var(--accent-dim);
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  transition: all 0.25s;
  padding: 0;
}

.order-btn:hover:not(:disabled) {
  color: var(--spark-gold);
  border-color: var(--spark-gold);
  background: rgba(232,168,56,0.08);
}

.order-btn:disabled {
  opacity: 0.2;
  cursor: not-allowed;
}

.order-hint {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.order-hint-icon {
  display: inline-block;
  color: var(--accent);
  font-size: 0.8rem;
}

/* On mobile/touch devices, drag-and-drop doesn't work natively.
   Show the up/down arrow controls instead. */
.order-controls { display: none; }

@media (hover: none), (max-width: 700px) {
  .order-row { cursor: default; }
  .order-row:active { cursor: default; }
  .order-handle { display: none; }
  .order-controls { display: flex; }
  .order-hint .desktop-only { display: none; }
  .order-hint .mobile-only { display: inline; }
}

@media (hover: hover) and (min-width: 701px) {
  .order-controls { display: none !important; }
  .order-hint .desktop-only { display: inline; }
  .order-hint .mobile-only { display: none; }
}

/* ============ BUTTONS ============ */
.btn-row {
  margin-top: 3rem;

      unitIds: state.unitIds,
      unitOrder: state.unitOrder,

// =============================================================================
// HELPERS
// =============================================================================
function el(tag, props, ...children) {
  props = props || {};
  const node = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') node.className = props[k];
    else if (k === 'html') node.innerHTML = props[k];
    else if (k === 'style') node.setAttribute('style', props[k]);
    else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === 'href' || k === 'target' || k === 'rel') node.setAttribute(k, props[k]);
    else if (k === 'disabled') { if (props[k]) node.setAttribute('disabled', ''); }
    else node[k] = props[k];
  }
  children.flat(Infinity).forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

    );

  const body = el('div', { class: 'unit-body' },

    el('div', { class: 'unit-inner' },
      el('div', { style: 'padding-top: 4px;' }, checkbox(checked, disabled, onToggle)),

    )

function orderRow(unit, position, total, index, onUp, onDown, onReorder) {
  const row = el('div', {
    class: 'order-row',
    draggable: 'true'
  },
    el('div', { class: 'order-handle', title: 'Drag to reorder' }, '⋮⋮'),
    el('div', { class: 'order-position' },
      el('span', { class: 'order-position-tag' }, 'Module'),
      el('span', { class: 'order-position-num' }, String(position))
    ),
    el('div', { class: 'order-body' },
      el('div', { class: 'order-title' }, unit.title),
      el('div', { class: 'order-descriptor' }, unit.descriptor)
    ),
    el('div', { class: 'order-controls' },
      el('button', { class: 'order-btn', disabled: position === 1, onclick: onUp, title: 'Move up' }, '▲'),
      el('button', { class: 'order-btn', disabled: position === total, onclick: onDown, title: 'Move down' }, '▼')
    )
  );

  row.dataset.index = String(index);

  row.addEventListener('dragstart', (e) => {
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', String(index));
  });

  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    document.querySelectorAll('.order-row').forEach(r => {
      r.classList.remove('drop-target-above', 'drop-target-below');
    });
  });

  row.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = row.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    row.classList.remove('drop-target-above', 'drop-target-below');
    if (e.clientY < midpoint) row.classList.add('drop-target-above');
    else row.classList.add('drop-target-below');
  });

  row.addEventListener('dragleave', () => {
    row.classList.remove('drop-target-above', 'drop-target-below');
  });

  row.addEventListener('drop', (e) => {
    e.preventDefault();
    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
    const toIdx = parseInt(row.dataset.index, 10);
    if (Number.isNaN(fromIdx) || Number.isNaN(toIdx) || fromIdx === toIdx) return;
    const rect = row.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    const dropAbove = e.clientY < midpoint;
    onReorder(fromIdx, toIdx, dropAbove);
  });

  return row;
}

function renderStep1() {

function renderStep2() {
  const sec = el('section', { class: 'step-section' },
    el('div', { class: 'section-label' }, 'Step Two · Select Modules'),
    el('h2', { class: 'step-h2', html: 'Select <em>four</em> three-week modules.' }),
    el('p', { class: 'step-desc' }, 'Each module devotes three weeks to a single contested issue, culminating in an Oxford-rules debate. You will order them in the next step.'),
    el('div', { class: 'counter' + (state.unitIds.length === 4 ? ' full' : '') },
      state.unitIds.length + ' of 4 selected' + (state.unitIds.length === 4 ? ' · maximum reached — uncheck one to swap' : '')
    )
  );

  // On first render of Step 2, auto-expand any topic that contains a
  // selected module so a returning user sees their picks. After that, the
  // user's manual open/close choices are respected for the rest of the session.
  if (!state.topicsAutoExpanded) {
    TOPIC_ORDER.forEach(topic => {
      const units = UNITS_BY_TOPIC[topic] || [];
      if (units.some(u => state.unitIds.includes(u.id))) {
        state.expandedTopics.add(topic);
      }
    });
    state.topicsAutoExpanded = true;
  }

  TOPIC_ORDER.filter(t => UNITS_BY_TOPIC[t]).forEach(topic => {
    const isOpen = state.expandedTopics.has(topic);
    const selectedInTopic = UNITS_BY_TOPIC[topic].filter(u => state.unitIds.includes(u.id)).length;

    const group = el('div', { class: 'topic-group' });

    const header = el('button', {
      class: 'topic-header',
      onclick: () => {
        if (state.expandedTopics.has(topic)) state.expandedTopics.delete(topic);
        else state.expandedTopics.add(topic);
        render();
      }
    },
      el('span', { class: 'topic-glyph', html: FLAME_SVG }),
      el('span', { class: 'topic-name' }, topic),
      el('span', { class: 'topic-chevron' }, isOpen ? '▾' : '▸'),
      selectedInTopic > 0
        ? el('span', { class: 'topic-count' }, selectedInTopic + ' selected')
        : null,
      el('span', { class: 'topic-rule' })
    );
    group.appendChild(header);

    const list = el('div', { class: 'topic-units' + (isOpen ? ' open' : '') });
    UNITS_BY_TOPIC[topic].forEach(u => {
      const checked = state.unitIds.includes(u.id);
      const disabled = state.unitIds.length >= 4;
      const expanded = state.expandedUnitId === u.id;
      list.appendChild(unitCard(u, checked, disabled,
        () => {
          if (checked) state.unitIds = state.unitIds.filter(x => x !== u.id);
          else if (state.unitIds.length < 4) state.unitIds = [...state.unitIds, u.id];
          reconcileOrder();
          saveDraft();
          render();
        },
        expanded,
        () => {
          state.expandedUnitId = expanded ? null : u.id;
          render();
        }
      ));
    });
    group.appendChild(list);

    sec.appendChild(group);
  });

  sec.appendChild(el('div', { class: 'btn-row' },
    el('button', { class: 'btn btn-small', onclick: () => { state.step = 1; saveDraft(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }, '← Back'),
    el('button', {
      class: 'btn btn-primary',
      disabled: !valid()[1],
      onclick: () => { state.step = 3; saveDraft(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }, 'Continue →')
  ));

  return sec;
}

function renderStep3() {
  // Make sure unitOrder is in sync (defensive)
  reconcileOrder();

  // Handler for drag-drop reordering: move item from `fromIdx` to a position
  // adjacent to `toIdx`. If `dropAbove` is true, the item is placed before
  // the target; otherwise after.
  const reorder = (fromIdx, toIdx, dropAbove) => {
    const arr = [...state.unitOrder];
    const [moved] = arr.splice(fromIdx, 1);
    // After the splice, indices >= fromIdx have shifted down by 1
    let insertAt = toIdx;
    if (fromIdx < toIdx) insertAt = toIdx - 1;
    if (!dropAbove) insertAt += 1;
    arr.splice(insertAt, 0, moved);
    state.unitOrder = arr;
    saveDraft();
    render();
  };

  const list = el('div', { class: 'order-list' });
  state.unitOrder.forEach((id, idx) => {
    const u = UNITS.find(x => x.id === id);
    if (!u) return;
    list.appendChild(orderRow(u, idx + 1, state.unitOrder.length, idx,
      () => {
        if (idx === 0) return;
        const arr = [...state.unitOrder];
        [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
        state.unitOrder = arr;
        saveDraft();
        render();
      },
      () => {
        if (idx === state.unitOrder.length - 1) return;
        const arr = [...state.unitOrder];
        [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]];
        state.unitOrder = arr;
        saveDraft();
        render();
      },
      reorder
    ));
  });

  return el('section', { class: 'step-section' },
    el('div', { class: 'section-label' }, 'Step Three · Order Modules'),
    el('h2', { class: 'step-h2', html: 'Set the <em>order</em> of your modules.' }),
    el('p', { class: 'step-desc' }, 'Arrange your four modules in the order they will be taught. The first module begins in Week 2 and the fourth ends in Week 13.'),
    el('div', { class: 'order-hint' },
      el('span', { class: 'order-hint-icon' }, '⋮⋮'),
      el('span', { class: 'desktop-only' }, 'Drag any row to reorder'),
      el('span', { class: 'mobile-only' }, 'Use the arrows to reorder')
    ),
    list,
    el('div', { class: 'btn-row' },
      el('button', { class: 'btn btn-small', onclick: () => { state.step = 2; saveDraft(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }, '← Back'),
      el('button', {
        class: 'btn btn-primary',
        disabled: !valid()[2],
        onclick: () => { state.step = 4; saveDraft(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
      }, 'Continue →')
    )
  );
}

function renderStep4() {
  const list = el('div', { class: 'card-list' });
  DEBRIEF_READINGS.forEach(r => {
    list.appendChild(readingRow(r, state.debriefIds.includes(r.id), false, () => {
      if (state.debriefIds.includes(r.id)) state.debriefIds = state.debriefIds.filter(x => x !== r.id);
      else state.debriefIds = [...state.debriefIds, r.id];

function renderStep5() {
  reconcileOrder();
  const warmup = WARMUP_READINGS.find(r => r.id === state.warmupId);
  const orderedUnits = state.unitOrder.map(id => UNITS.find(u => u.id === id)).filter(Boolean);

  const previewCard = el('div', { class: 'card preview-card' });

  previewCard.appendChild(el('div', { class: 'preview-head' },

  previewCard.appendChild(previewBlock('Intro Week', 'Week 1',
    warmup
      ? el('div', { class: 'preview-warmup', html:
          '<strong>' + escapeHtml(warmup.author) + '</strong>, <em>' + escapeHtml(warmup.title) + '</em>' + (warmup.year ? ' (' + warmup.year + ')' : '')
        })
      : el('div', { class: 'preview-empty' }, 'No Intro Week reading selected.')
  ));

  if (orderedUnits.length === 0) {
    previewCard.appendChild(previewBlock('Modules', 'Weeks 2–13',
      el('div', { class: 'preview-empty' }, 'No modules selected.')
    ));
  } else {
    orderedUnits.forEach((u, idx) => {
      const startWeek = 2 + idx * 3;
      const endWeek = startWeek + 2;
      const body = el('div', {});
      body.appendChild(el('div', { class: 'preview-descriptor' }, u.descriptor));
      u.weeks.forEach(wk => {
        const row = el('div', { class: 'preview-week-row' },
          el('div', { class: 'preview-week-tag' }, 'Week ' + (startWeek + wk.week - 1) + ' · ' + wk.title),
          el('ul', { class: 'reading-list', style: 'margin-top: 0.4rem;' },
            wk.readings.map(r => el('li', {}, r))
          )
        );
        body.appendChild(row);
      });
      body.appendChild(el('div', { class: 'preview-resolution' },
        el('span', { class: 'preview-resolution-tag' }, 'Resolution'),
        el('span', { class: 'preview-resolution-text' }, '"' + u.debateResolution + '"')
      ));
      previewCard.appendChild(previewBlock(
        'Module ' + (idx + 1) + ': ' + u.title,
        'Weeks ' + startWeek + '–' + endWeek,
        body
      ));
    });
  }

  previewCard.appendChild(previewBlock('Last Week of the Semester: Debrief Week', 'Week 14',
    selectedDebriefs.length === 0
      ? el('div', { class: 'preview-empty' }, 'No Debrief Week readings selected.')
      : el('ul', { class: 'preview-debrief-list' },
          selectedDebriefs.map(r => el('li', { html:
            '<strong>' + escapeHtml(r.author) + '</strong>, <em>' + escapeHtml(r.title) + '</em>' + (r.year ? ' (' + r.year + ')' : '')
          }))
        )
  ));

  return el('section', { class: 'step-section' },
    el('div', { class: 'section-label' }, 'Step Five · Final'),
    el('h2', { class: 'step-h2', html: 'Your <em>syllabus</em>.' }),
    el('p', { class: 'step-desc' }, 'A 14-week skeleton. Edit any step to swap selections; your draft is saved automatically.'),
    previewCard,
    el('div', { class: 'btn-row' },
      el('button', { class: 'btn btn-small', onclick: () => { state.step = 4; saveDraft(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }, '← Back'),
      el('button', { class: 'btn btn-primary', onclick: () => window.print() }, 'Print / Save as PDF')
    )
  );
}

function render() {
  renderHero();
  renderStepper();
  const content = document.getElementById('step-content');
  content.innerHTML = '';
  if (state.step === 1) content.appendChild(renderStep1());
  else if (state.step === 2) content.appendChild(renderStep2());
  else if (state.step === 3) content.appendChild(renderStep3());
  else if (state.step === 4) content.appendChild(renderStep4());
  else if (state.step === 5) content.appendChild(renderStep5());
}

// =============================================================================
// FIREFLY CANVAS
// =============================================================================
const canvas = document.getElementById('spark-canvas');
const ctx = canvas.getContext('2d');
let w, h;
let mouse = { x: -1000, y: -1000 };
let fireflies = [];
let time = 0;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

class Firefly {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = 1 + Math.random() * 2.5;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = 0.12 + Math.random() * 0.32;
    this.turnSpeed = 0.005 + Math.random() * 0.02;
    this.turnBias = (Math.random() - 0.5) * 0.02;
    this.glowPhase = Math.random() * Math.PI * 2;
    this.glowSpeed = 0.014 + Math.random() * 0.012;
    this.glowStyle = Math.random();
    this.brightness = 0;
    this.peakBrightness = 0.4 + Math.random() * 0.6;
    const c = Math.random();
    if (c < 0.5) { this.r = 240 + Math.random() * 15; this.g = 180 + Math.random() * 40; this.b = 50 + Math.random() * 40; }
    else if (c < 0.8) { this.r = 230 + Math.random() * 25; this.g = 140 + Math.random() * 50; this.b = 30 + Math.random() * 30; }
    else { this.r = 255; this.g = 220 + Math.random() * 30; this.b = 160 + Math.random() * 60; }
  }
  update() {
    this.angle += this.turnBias + Math.sin(time * this.turnSpeed) * 0.03;
    if (Math.random() < 0.005) this.turnBias = (Math.random() - 0.5) * 0.02;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    const m = 50;
    if (this.x < -m) this.x = w + m;
    if (this.x > w + m) this.x = -m;
    if (this.y < -m) this.y = h + m;
    if (this.y > h + m) this.y = -m;
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 120 && d > 0) {
      const f = (120 - d) / 120 * 0.3;
      this.x += (dx / d) * f; this.y += (dy / d) * f;
    }
    this.glowPhase += this.glowSpeed;
    if (this.glowStyle < 0.4) {
      this.brightness = this.peakBrightness * Math.max(0, Math.sin(this.glowPhase));
    } else if (this.glowStyle < 0.7) {
      const c = this.glowPhase % (Math.PI * 2);
      this.brightness = c < 0.8 ? this.peakBrightness * Math.sin(c / 0.8 * Math.PI) : 0;
    } else {
      const c = this.glowPhase % (Math.PI * 3);
      if (c < 0.5) this.brightness = this.peakBrightness * Math.sin(c / 0.5 * Math.PI);
      else if (c > 0.8 && c < 1.3) this.brightness = this.peakBrightness * 0.6 * Math.sin((c - 0.8) / 0.5 * Math.PI);
      else this.brightness *= 0.9;
    }
  }
  draw() {
    if (this.brightness < 0.02) return;
    const a = this.brightness;
    const r = Math.floor(this.r), g = Math.floor(this.g), b = Math.floor(this.b);
    const gs = this.size * (8 + this.brightness * 6);
    const og = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gs);
    og.addColorStop(0, `rgba(${r},${g},${b},${a * 0.12})`);
    og.addColorStop(0.4, `rgba(${r},${g},${Math.floor(b * 0.5)},${a * 0.05})`);
    og.addColorStop(1, 'transparent');
    ctx.fillStyle = og;
    ctx.fillRect(this.x - gs, this.y - gs, gs * 2, gs * 2);
    const isz = this.size * 3;
    const ig = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, isz);
    ig.addColorStop(0, `rgba(${r},${g},${b},${a * 0.5})`);
    ig.addColorStop(1, 'transparent');
    ctx.fillStyle = ig;
    ctx.fillRect(this.x - isz, this.y - isz, isz * 2, isz * 2);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${a * 0.9})`;
    ctx.fill();
    if (this.brightness > 0.3) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,230,${a * 0.6})`;
      ctx.fill();
    }
  }
}

for (let i = 0; i < 80; i++) fireflies.push(new Firefly());

function animate() {
  time++;
  ctx.fillStyle = 'rgba(10,10,15,0.3)';
  ctx.fillRect(0, 0, w, h);
  fireflies.forEach(f => { f.update(); f.draw(); });
  requestAnimationFrame(animate);
}
animate();

// ============ NAV SCROLL ============
window.addEventListener('scroll', () => {
  const nav = document.getElementById('main-nav');
  if (window.scrollY > 100) nav.classList.add('scrolled');
  else nav.classList.remove('scrolled');
});

// ============ INIT ============
loadDraft();
reconcileOrder();
render();
</script>
